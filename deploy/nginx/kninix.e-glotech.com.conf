# nginx reverse proxy for Kninix Studio headless MCP (HTTP + SSE) under a subdomain.
#   Public:  https://kninix.e-glotech.com/sse
#   Backend: 127.0.0.1:3333  (KX_MCP_HOST=127.0.0.1, KX_MCP_PORT=3333)
#
# The MCP server binds LOOPBACK only; nginx is the sole public door and terminates TLS.
# Auth is the app bearer token (KX_MCP_TOKEN) which the client sends and nginx passes
# through untouched — see DEPLOY.md.
#
# Install:
#   sudo cp deploy/nginx/kninix.e-glotech.com.conf /etc/nginx/sites-available/kninix.e-glotech.com
#   sudo ln -s /etc/nginx/sites-available/kninix.e-glotech.com /etc/nginx/sites-enabled/
#   sudo certbot certonly --nginx -d kninix.e-glotech.com   # get the cert first
#   sudo nginx -t && sudo systemctl reload nginx

server {
    listen 80;
    listen [::]:80;
    server_name kninix.e-glotech.com;

    # Let certbot renew over HTTP; send everything else to HTTPS.
    location /.well-known/acme-challenge/ { root /var/www/html; }
    location / { return 301 https://$host$request_uri; }
}

server {
    # HTTP/2 omitted: the `http2 on;` directive needs nginx >= 1.25.1. If your nginx is
    # newer and you want it, add `http2 on;` here; on older nginx use `listen 443 ssl http2;`.
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name kninix.e-glotech.com;

    ssl_certificate     /etc/letsencrypt/live/kninix.e-glotech.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/kninix.e-glotech.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # Optional: keep bots out of the logs; the app already 401s without a token.
    # access_log /var/log/nginx/kninix.access.log;

    location / {
        proxy_pass http://127.0.0.1:3333;
        proxy_http_version 1.1;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # Pass the client's `Authorization: Bearer <KX_MCP_TOKEN>` straight through.

        # --- Server-Sent Events: the part that matters ---
        proxy_set_header Connection '';       # keep the upstream stream open
        proxy_buffering  off;                 # never buffer SSE (also honours X-Accel-Buffering: no)
        proxy_cache      off;
        chunked_transfer_encoding off;
        proxy_read_timeout 24h;               # long-lived SSE connection (app pings every 15s)
        proxy_send_timeout 24h;
    }
}
